# configuración Base 
base:
  data:
    data_dir: "data/raw/combined"
    max_date: "2024-08-31"
    train_end_date: "2023-06-30"
    val_end_date: "2023-12-31" 
    test_end_date: "2024-08-31"
  
  model:
    delta_t: 30                 # Ventana temporal de 30 minutos
    sequence_length: 12         # 6 horas de contexto (12 * 30min)
    hidden_size: 128           # Tamaño de capa oculta balanceado
    num_layers: 2              # 2 capas LSTM
    dropout: 0.2               # Regularización moderada
    device: "auto"             # Detectar automáticamente CPU/CUDA
  
  training:
    epochs: 50                 # Épocas suficientes para convergencia
    batch_size: 32             # Batch size balanceado
    learning_rate: 0.001       # Learning rate estándar
    patience: 10               # Early stopping patience
    experiment_name: "EcoBici_RNN_Base"

# configuración Rápida
small_fast:
  data:
    data_dir: "data/raw/combined"
    max_date: "2024-08-31"
    train_end_date: "2023-06-30"
    val_end_date: "2023-12-31"
    test_end_date: "2024-08-31"
  
  model:
    delta_t: 30
    sequence_length: 6          # Solo 3 horas de contexto
    hidden_size: 64            # Modelo más pequeño
    num_layers: 1              # Una sola capa LSTM
    dropout: 0.1               # Menos regularización
    device: "auto"
  
  training:
    epochs: 20                 # Menos épocas para pruebas rápidas
    batch_size: 64             # Batch más grande para velocidad
    learning_rate: 0.002       # Learning rate más alto
    patience: 5                # Menos paciencia
    experiment_name: "EcoBici_RNN_SmallFast"

# configuración Profunda
