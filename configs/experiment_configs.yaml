# configuración Memory Optimized para hardware limitado
memory_optimized:
  data:
    data_dir: "data/raw/combined"
    max_date: "2024-08-31"
    train_end_date: "2023-06-30"
    val_end_date: "2023-12-31"
    test_end_date: "2024-08-31"
    sample_fraction: 0.1       # Usar solo 10% de los datos
  
  model:
    delta_t: 60               # Ventanas más grandes reducen dimensionalidad
    sequence_length: 6        # Secuencia corta para menos memoria
    hidden_size: 32           # Modelo muy pequeño
    num_layers: 1             # Una sola capa
    dropout: 0.1              # Dropout mínimo
    device: "cpu"             # Forzar CPU
  
  training:
    epochs: 30                # Épocas moderadas
    batch_size: 8             # Batch muy pequeño para RAM limitada
    learning_rate: 0.002      # Learning rate moderado
    patience: 5               # Paciencia limitada
    experiment_name: "EcoBici_RNN_MemoryOptimized" 